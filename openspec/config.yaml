schema: spec-driven
version: "1.0"
date_initialized: "2026-06-30"

context: |
  ## Project: capital_integration

  Sub-project of TRADING_PROJECT_DEFINITIVE. Hexagonal trading engine with pluggable broker providers.

  ### Stack
  - **Language**: Python 3.11+
  - **Package Manager**: uv
  - **Architecture**: Hexagonal/Clean (domain / application / infrastructure)
  - **Test Framework**: pytest 9.1.1 (40 tests, ~67s execution)

  ### Key Modules
  - **domain/entities**: Candle, Signal, Direction, Order
  - **domain/ports**: StrategyPort, BrokerPort, ClockPort
  - **domain/adapters**: FadeStrategy (price action + anti-drift)
  - **application**: TradingCycle, MainLoop
  - **infrastructure/capital**: Broker (IG Markets), Session, Clock

  ### Testing
  - Strict TDD enabled: RED → GREEN → REFACTOR
  - Test command: `.venv/bin/pytest`
  - All tests passing (40 unit + integration)

rules:
  proposal:
    - Include rollback plan for broker-level changes
    - Explain impact on signal evaluation or trade execution
    - Document anti-drift interaction if signal logic changes

  specs:
    - Use Given/When/Then for signal/order scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Cover both happy path and error cases (rejected orders, invalid signals)

  design:
    - Diagram signal flow: market data → FadeStrategy → Signal → TradingCycle → BrokerPort
    - Document architecture decisions (why hexagonal, why this separation)
    - Show port interfaces and adapter implementations

  tasks:
    - Group by phase (RED, GREEN, REFACTOR)
    - One TDD cycle per task when possible
    - Keep tasks completable in one session

  apply:
    tdd: true
    test_command: ".venv/bin/pytest"
    strict_tdd_mode: true
    notes: "Follow RED-GREEN-REFACTOR strictly. Write test first, then implementation, then refactor."

  verify:
    test_command: ".venv/bin/pytest"
    build_command: ""
    coverage_threshold: 0
    notes: "All 40 tests must pass. Report any warning summary."

  archive:
    - Warn before merging destructive deltas to main specs
    - Preserve anti-drift detection logic if modified
    - Update specs/trading-engine/spec.md with any signal/order changes

testing:
  strict_tdd: true
  test_runner: pytest
  test_command: ".venv/bin/pytest"
  test_paths:
    - tests/unit
    - tests/integration
  pythonpath:
    - src
  expected_test_count: 40
  expected_duration_seconds: 67

conventions:
  language: English
  commit_style: conventional
  code_principles:
    - SRP (Single Responsibility Principle)
    - DRY (Don't Repeat Yourself)
    - SOLID (S, O, L, I, D)
  comments:
    - Zero narrative comments
    - Only WHY/contract comments when non-obvious
  naming:
    - Expressive enough to self-explain without comments
    - Use domain terminology (candle, signal, order, epic, direction)
