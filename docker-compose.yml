services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trade_journal
      POSTGRES_USER: operator
      POSTGRES_PASSWORD: operator_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operator -d trade_journal"]
      interval: 5s
      timeout: 3s
      retries: 10

  token-refresher:
    build: .
    command: ["python", "src/token_refresher.py"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://operator:operator_dev@postgres:5432/trade_journal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,psycopg,sys; c=psycopg.connect(os.environ['DATABASE_URL']); sys.exit(0 if c.execute('SELECT 1 FROM capital_session WHERE id=1').fetchone() else 1)\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s

  polygon-ingestion:
    build: .
    command: ["python", "src/ingestion_polygon.py"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://operator:operator_dev@postgres:5432/trade_journal
    depends_on:
      postgres:
        condition: service_healthy

  # Capital WS candle ingestion — kept as a fallback, disabled while Polygon is
  # the active candle source. Re-enable and set PROVIDER=capital to switch back.
  # ingestion:
  #   build: .
  #   command: ["python", "src/ingestion.py"]
  #   restart: unless-stopped
  #   env_file: .env
  #   environment:
  #     DATABASE_URL: postgresql://operator:operator_dev@postgres:5432/trade_journal
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     token-refresher:
  #       condition: service_healthy

  api:
    build: .
    command: ["python", "src/api.py"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://operator:operator_dev@postgres:5432/trade_journal
      API_HOST: 0.0.0.0
      API_PORT: "8001"
      CORS_ALLOW_ORIGINS: http://localhost:5173
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  operator:
    build: .
    command: ["python", "src/__main__.py"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://operator:operator_dev@postgres:5432/trade_journal
      PROVIDER: polygon
    depends_on:
      postgres:
        condition: service_healthy
      token-refresher:
        condition: service_healthy
      polygon-ingestion:
        condition: service_started

  reconciler:
    build: .
    command: ["python", "src/reconciler.py"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://operator:operator_dev@postgres:5432/trade_journal
      PROVIDER: polygon
    depends_on:
      postgres:
        condition: service_healthy
      token-refresher:
        condition: service_healthy

volumes:
  pgdata: {}
